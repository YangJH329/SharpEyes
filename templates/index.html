<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpEyes AI Dashboard</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background-color: #0f0f12; color: #ffffff;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif;
            overflow: hidden;
        }
        .dashboard-wrapper { display: flex; width: 100%; height: 100vh; box-sizing: border-box; }
        
        /* [좌측] 비전 스트리밍 영역 (70%) */
        .video-zone {
            flex: 7; height: 100%; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between; background-color: #13131a;
        }
        .video-header h1 { margin: 0 0 5px 0; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        .video-header p { margin: 0; color: #71717a; font-size: 14px; }
        
        .video-container {
            flex: 1; margin: 20px 0; background-color: #000000;
            border: 2px solid #27272a; border-radius: 12px; overflow: hidden;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .video-stream {
            width: 100%; height: 100%; object-fit: contain; display: block;
            image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;
            transform: translateZ(0); backface-visibility: hidden;
        }
        .placeholder-text { font-size: 22px; color: #3f3f46; font-weight: 700; display: none; }

        /* 하단 버튼바 시스템 */
        .control-area { height: 60px; display: flex; align-items: center; gap: 15px; position: relative; }
        .btn {
            padding: 14px 30px; font-size: 15px; font-weight: 700; color: white;
            border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s ease-in-out; letter-spacing: 0.5px;
            box-sizing: border-box;
        }
        
        .dropdown-wrapper { position: relative; }
        .btn-mode { background-color: #3f3f46; border: 1px solid #52525b; }
        .dropdown-menu {
            position: absolute; bottom: 70px; left: 0;
            background-color: #1c1c24; border: 1px solid #3f3f46; border-radius: 8px;
            width: 160px; display: none; flex-direction: column; overflow: hidden; z-index: 10;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .dropdown-item { padding: 12px 16px; font-size: 14px; color: #e4e4e7; cursor: pointer; text-align: left; transition: background 0.2s; }
        .dropdown-item:hover { background-color: #27272a; color: #f59e0b; }

        .btn-running { background-color: #f59e0b; min-width: 160px; } 
        .btn-stopped { background-color: #10b981; min-width: 160px; } 
        
        /* End of Exercise 활성화 활성 스타일 */
        .btn-end { background-color: #ef4444; }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* [우측] 데이터 사이드바 영역 (30%) */
        .data-sidebar {
            flex: 3; height: 100%; background-color: #1c1c24;
            border-left: 2px solid #27272a; padding: 30px 20px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .sidebar-main-content { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        
        .sidebar-title {
            font-size: 18px; font-weight: 700; color: #a1a1aa; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 10px; border-left: 4px solid #f59e0b; padding-left: 10px;
            transition: border-color 0.3s ease;
        }
        .info-card {
            background-color: #13131a; border: 1px solid #27272a; border-radius: 10px;
            padding: 20px; display: flex; flex-direction: column; justify-content: center;
        }
        .card-label { font-size: 13px; color: #71717a; font-weight: 600; margin-bottom: 5px; }
        .count-card { align-items: center; padding: 30px 20px; background: linear-gradient(145deg, #13131a, #1a1a24); border: 1px solid #3f3f46; transition: border-color 0.3s ease; }
        
        .count-value { font-size: 84px; font-weight: 900; color: #f59e0b; line-height: 1; margin-top: 10px; font-family: monospace, sans-serif; transition: color 0.3s ease; }
        .status-value { font-size: 24px; font-weight: 700; color: #38bdf8; margin-top: 5px; }
        .feedback-value { font-size: 20px; font-weight: 700; color: #10b981; margin-top: 5px; line-height: 1.4; }

        /* 우측 하단 상태 인디케이터 스타일 */
        .status-indicator-zone {
            border-top: 1px solid #27272a; padding-top: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .indicator-label { font-size: 12px; color: #71717a; font-weight: 700; letter-spacing: 0.5px; }
        
        .mode-badge {
            padding: 6px 14px; font-size: 12px; font-weight: 800; border-radius: 20px;
            letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.3s ease;
        }
        .theme-squat { background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .theme-pullup { background-color: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }

        /* ==========================================
           새로 추가된 세션 리포트 모달 팝업 CSS 스타일
           ========================================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal-content {
            background-color: #1c1c24; border: 2px solid #27272a; border-radius: 16px;
            padding: 40px; width: 450px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .modal-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-top: 0; margin-bottom: 25px; color: #f59e0b; }
        
        .modal-grid { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 30px; }
        .modal-card {
            flex: 1; background-color: #13131a; border: 1px solid #27272a; border-radius: 10px; padding: 15px;
        }
        .modal-card-label { font-size: 12px; color: #71717a; font-weight: 700; margin-bottom: 5px; }
        .modal-card-value { font-size: 28px; font-weight: 800; color: #ffffff; font-family: monospace, sans-serif; }

        .btn-modal-close {
            width: 100%; padding: 14px 0; background-color: #3f3f46; color: white;
            font-size: 15px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s;
        }
        .btn-modal-close:hover { background-color: #27272a; }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <div class="video-zone">
            <div class="video-header">
                <h1>SharpEyes 실시간 피드백 시스템</h1>
                <p>컴퓨터 비전 기술을 활용한 독립형 하이브리드 모션 분석 엔진</p>
            </div>
            <div class="video-container">
                <img src="" id="stream-img" class="video-stream" alt="AI 모션 분석 피드 Channel" style="display: none;">
                <div id="placeholder" class="placeholder-text" style="display: block;">SYSTEM PAUSED</div>
            </div>

            <div class="control-area">
                <div class="dropdown-wrapper">
                    <button class="btn btn-mode" onclick="toggleDropdown()">MODE SELECT</button>
                    <div id="mode-menu" class="dropdown-menu">
                        <div class="dropdown-item" onclick="changeMode('squat')">SQUAT</div>
                        <div class="dropdown-item" onclick="changeMode('pullup')">PULL-UP</div>
                    </div>
                </div>
                <button id="toggle-btn" class="btn btn-stopped" onclick="toggleStream()">RESUME SYSTEM</button>
                
                <button class="btn btn-end" onclick="showReport()">END OF EXERCISE</button>
            </div>
        </div>

        <div class="data-sidebar">
            <div class="sidebar-main-content">
                <div id="sidebar-title-line" class="sidebar-title">Live Analysis</div>
                <div id="ui-count-card" class="info-card count-card">
                    <div class="card-label">TOTAL COUNT</div>
                    <div id="ui-count" class="count-value">0</div>
                </div>
                <div class="info-card">
                    <div class="card-label">CURRENT STAGE</div>
                    <div id="ui-stage" class="status-value">READY</div>
                </div>
                <div class="info-card">
                    <div class="card-label">REAL-TIME FEEDBACK</div>
                    <div id="ui-feedback" class="feedback-value">START EXERCISE</div>
                </div>
            </div>

            <div class="status-indicator-zone">
                <div class="indicator-label">ENGINE STATUS</div>
                <div id="ui-mode-badge" class="mode-badge theme-squat">SQUAT MODE</div>
            </div>
        </div>
    </div>

    <div id="report-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">SESSION REPORT</div>
            
            <div class="modal-grid">
                <div class="modal-card">
                    <div class="modal-card-label">TOTAL TIME</div>
                    <div id="modal-time" class="modal-card-value">00:00</div>
                </div>
                <div class="modal-card">
                    <div class="modal-card-label">TOTAL COUNT</div>
                    <div id="modal-count" class="modal-card-value">0</div>
                </div>
            </div>
            <button id="btn-save-log" class="btn-modal-close" style="background-color: #10b981; margin-bottom: 12px;" onclick="handleSaveWorkout()">SAVE WORKOUT LOG</button>

            <button class="btn-modal-close" onclick="closeReport()">RESTART EXERCISE</button>
        </div>
    </div>

    <script>
        // 운동 경과 시간 및 타이머 제어를 위한 글로벌 변수
    let startTime = null;
    let totalElapsedSeconds = 0;
    let timerInterval = null;

    // 현재 인증 탭 상태 관리 변수 (기본값: 로그인)
    let currentAuthMode = 'login';

    // 페이지가 로드되자마자 백엔드 실시간 데이터 수신 폴링 가동
    // 단, 로그인 모달이 열려있는 동안은 백엔드 요청을 일시 차단합니다.
    setInterval(() => {
        const authModal = document.getElementById('auth-modal');
        const btn = document.getElementById('toggle-btn');
    
        // 로그인 모달이 닫혀있고, 카메라 일시정지 상태가 아닐 때만 폴링 진행
        if (authModal.style.display === 'none' && !btn.classList.contains('btn-stopped')) {
            fetch('/get_data')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ui-count').innerText = data.count;
                document.getElementById('ui-stage').innerText = data.stage;
                document.getElementById('ui-feedback').innerText = data.feedback;
            })
            .catch(err => console.error("데이터 수신 오류:", err));
        }
    }, 100);

    // =============================================================
    // 1. 사용자 인증 관리 시스템 (로그인 / 회원가입)
    // =============================================================

    // 로그인 탭과 회원가입 탭을 클릭했을 때 인터랙션을 제어하는 함수
    function switchAuthTab(mode) {
        currentAuthMode = mode;
        const loginTab = document.getElementById('tab-login');
        const registerTab = document.getElementById('tab-register');
        const confirmZone = document.getElementById('register-confirm-zone');
        const submitBtn = document.getElementById('btn-auth-submit');
        const title = document.getElementById('auth-title');

        if (mode === 'login') {
            title.innerText = "SHARPEYES LOGIN";
            loginTab.style.borderColor = "#f59e0b";
            registerTab.style.borderColor = "#52525b";
            confirmZone.style.display = "none";
            submitBtn.innerText = "SIGN IN";
            submitBtn.style.backgroundColor = "#f59e0b";
        } else {
            title.innerText = "SHARPEYES REGISTER";
            loginTab.style.borderColor = "#52525b";
            registerTab.style.borderColor = "#38bdf8";
            confirmZone.style.display = "block";
            submitBtn.innerText = "CREATE ACCOUNT";
            submitBtn.style.backgroundColor = "#38bdf8";
        }
    }

    // 입력 폼 데이터를 가공하여 백엔드 SQLite3와 통신하는 핵심 함수
    function handleAuthSubmit() {
        const usernameInput = document.getElementById('auth-username').value.trim();
        const passwordInput = document.getElementById('auth-password').value.trim();
        const passwordConfirmInput = document.getElementById('auth-password-confirm').value.trim();

    // 입력 누락 사전 방어
    if (!usernameInput || !passwordInput) {
        alert("아이디와 비밀번호를 모두 입력해 주세요.");
        return;
    }

    // 회원가입 모드일 때 비밀번호 일치 여부 검증
    if (currentAuthMode === 'register' && passwordInput !== passwordConfirmInput) {
        alert("비밀번호 확인이 일치하지 않습니다.");
        return;
    }

    // 현재 선택 모드에 맞춰 API 엔드포인트 분기
    const targetEndpoint = currentAuthMode === 'login' ? '/login' : '/register';

    // 백엔드 파이썬 라우터로 비동기 JSON 데이터 전송
    fetch(targetEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: usernameInput,
            password: passwordInput
        })
    })
    .then(async (response) => {
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.detail || "인증 처리 중 서버 오류가 발생했습니다.");
        }
        return data;
    })
    .then(data => {
        if (data.status === 'success') {
            if (currentAuthMode === 'login') {
                // 로그인 성공 시 흐름
                alert(data.message);
                document.getElementById('auth-modal').style.display = 'none';
                
                // 시스템 정식 가동 및 타이머 리셋 후 시작
                resetTimer();
            } else {
                // 회원가입 성공 시 흐름
                alert(data.message + " 로그인 탭에서 로그인을 획득해 주세요.");
                document.getElementById('auth-password').value = "";
                document.getElementById('auth-password-confirm').value = "";
                switchAuthTab('login');
            }
        }
    })
    .catch(err => {
        alert("인증 실패: " + err.message);
    });
}

// =============================================================
// 2. 운동 타이머 및 분석 세션 제어 시스템
// =============================================================

function startTimer() {
    if (!timerInterval) {
        startTime = Date.now() - (totalElapsedSeconds * 1000);
        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            totalElapsedSeconds = elapsed;
        }, 1000);
    }
}

function pauseTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

function resetTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    totalElapsedSeconds = 0;
    startTimer();
}

function formatTime(seconds) {
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    return `${m}:${s}`;
}

// END OF EXERCISE 버튼 핸들러
function showReport() {
    // 1. 경과 타이머 일시정지
    pauseTimer();

    // 2. 비디오 비전 분석 차단 및 플레이스홀더 전환
    const img = document.getElementById('stream-img');
    const placeholder = document.getElementById('placeholder');
    const btn = document.getElementById('toggle-btn');

    img.src = "";
    img.style.display = "none";
    placeholder.innerText = "EXERCISE END";
    placeholder.style.display = "block";
    btn.innerText = "RESUME SYSTEM";
    btn.className = "btn btn-stopped";

    // 3. 현재 화면 실시간 스코어를 캡처하여 모달 컴포넌트에 주입
    const currentCount = document.getElementById('ui-count').innerText;
    document.getElementById('modal-count').innerText = currentCount;
    document.getElementById('modal-time').innerText = formatTime(totalElapsedSeconds);

    // 4. 리포트 모달 출력
    document.getElementById('report-modal').style.display = 'flex';
}

// RESTART EXERCISE 버튼 핸들러
function closeReport() {
    document.getElementById('report-modal').style.display = 'none';
    resetTimer();

    // 저장 버튼 상태 초기화 코드 추가
    const saveBtn = document.getElementById('btn-save-log');
    saveBtn.innerText = "SAVE WORKOUT LOG";
    saveBtn.style.backgroundColor = "#10b981";
    saveBtn.disabled = false;

    // 현재 적용 중인 디바이스 배지 텍스트를 파싱하여 백엔드 코어 강제 동기화 재부팅
    const badgeText = document.getElementById('ui-mode-badge').innerText;
    const targetMode = badgeText.includes('SQUAT') ? 'squat' : 'pullup';
    changeMode(targetMode);
}

// =============================================================
// 3. 운동 환경 설정 및 스트리밍 상태 제어 시스템
// =============================================================

function toggleDropdown() {
    const menu = document.getElementById('mode-menu');
    menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
}

function changeMode(modeName) {
    document.getElementById('mode-menu').style.display = 'none';
    
    const img = document.getElementById('stream-img');
    const placeholder = document.getElementById('placeholder');
    const btn = document.getElementById('toggle-btn');
    
    const badge = document.getElementById('ui-mode-badge');
    const countTxt = document.getElementById('ui-count');
    const countCard = document.getElementById('ui-count-card');
    const sideTitle = document.getElementById('sidebar-title-line');
    
    fetch('/set_mode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: modeName })
    })
    .then(response => response.json())
    .then(data => {
        if(data.status === 'success') {
            countTxt.innerText = "0";
            document.getElementById('ui-stage').innerText = "READY";
            document.getElementById('ui-feedback').innerText = "MODE SWAP -> RESUME SYSTEM";
            
            img.src = "";
            img.style.display = "none";
            placeholder.innerText = modeName.toUpperCase() + " MODE READY";
            placeholder.style.display = "block";
            
            btn.innerText = "RESUME SYSTEM";
            btn.className = "btn btn-stopped";

            if (modeName === 'squat') {
                badge.innerText = "SQUAT MODE";
                badge.className = "mode-badge theme-squat";
                countTxt.style.color = "#f59e0b";
                countCard.style.borderColor = "#3f3f46";
                sideTitle.style.borderColor = "#f59e0b";
            } else {
                badge.innerText = "PULL-UP MODE";
                badge.className = "mode-badge theme-pullup";
                countTxt.style.color = "#38bdf8";
                countCard.style.borderColor = "#0284c7";
                sideTitle.style.borderColor = "#38bdf8";
            }
        }
    })
    .catch(err => console.error("모드 전환 오류:", err));
}

function toggleStream() {
    fetch('/toggle', { method: 'POST' })
    .then(response => response.json())
    .then(data => {
        const img = document.getElementById('stream-img');
        const placeholder = document.getElementById('placeholder');
        const btn = document.getElementById('toggle-btn');
        
        if (data.status === 'stopped') {
            img.src = "";
            img.style.display = "none";
            placeholder.innerText = "CAMERA OFF";
            placeholder.style.display = "block";
            btn.innerText = "RESUME SYSTEM";
            btn.className = "btn btn-stopped";
            pauseTimer();
        } else {
            img.src = "/video_feed?t=" + new Date().getTime();
            img.style.display = "block";
            placeholder.style.display = "none";
            btn.innerText = "PAUSE SYSTEM";
            btn.className = "btn btn-running";
            startTimer();
        }
    })
    .catch(err => console.error(err));
}   

    // [SAVE WORKOUT LOG] 버튼 클릭 시 현재 모달의 데이터를 백엔드 DB로 넘겨주는 함수
function handleSaveWorkout() {
    // 1. 현재 화면(모달)에 찍혀있는 값과 배지 상태에서 운동 데이터 추출
    const timeValue = document.getElementById('modal-time').innerText;
    const countValue = parseInt(document.getElementById('modal-count').innerText, 10);
    
    const badgeText = document.getElementById('ui-mode-badge').innerText;
    const currentMode = badgeText.includes('SQUAT') ? 'squat' : 'pullup';

    const saveBtn = document.getElementById('btn-save-log');

    // 2. 백엔드 /save_workout API로 비동기 POST 요청 전송
    fetch('/save_workout', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            exercise_mode: currentMode,
            total_count: countValue,
            total_time: timeValue
        })
    })
    .then(async (response) => {
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.detail || "기록 저장 중 오류가 발생했습니다.");
        }
        return data;
    })
    .then(data => {
        if (data.status === 'success') {
            alert(data.message);
            
            // 저장이 완료되면 버튼을 비활성화 상태로 바꾸어 중복 저장을 방지합니다.
            saveBtn.innerText = "SAVED SUCCESSFULLY";
            saveBtn.style.backgroundColor = "#3f3f46";
            saveBtn.disabled = true;
        }
    })
    .catch(err => {
        alert("저장 실패: " + err.message);
    });
}
    </script>
    
    <div id="auth-modal" class="modal-overlay" style="display: flex;">
        <div class="modal-content" style="width: 400px;">
            <div class="modal-title" id="auth-title">SHARPEYES LOGIN</div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <button id="tab-login" class="btn btn-mode" style="flex: 1; border-color: #f59e0b;" onclick="switchAuthTab('login')">LOGIN</button>
                <button id="tab-register" class="btn btn-mode" style="flex: 1;" onclick="switchAuthTab('register')">REGISTER</button>
            </div>

            <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; text-align: left;">
                <div>
                    <label class="card-label">USERNAME</label>
                    <input type="text" id="auth-username" style="width: 100%; padding: 12px; background-color: #13131a; border: 1px solid #27272a; border-radius: 6px; color: white; box-sizing: border-box; margin-top: 5px;" placeholder="아이디를 입력하세요">
                </div>
                <div>
                    <label class="card-label">PASSWORD</label>
                    <input type="password" id="auth-password" style="width: 100%; padding: 12px; background-color: #13131a; border: 1px solid #27272a; border-radius: 6px; color: white; box-sizing: border-box; margin-top: 5px;" placeholder="비밀번호를 입력하세요">
                </div>
                <div id="register-confirm-zone" style="display: none;">
                    <label class="card-label">CONFIRM PASSWORD</label>
                    <input type="password" id="auth-password-confirm" style="width: 100%; padding: 12px; background-color: #13131a; border: 1px solid #27272a; border-radius: 6px; color: white; box-sizing: border-box; margin-top: 5px;" placeholder="비밀번호를 한번 더 입력하세요">
                </div>
            </div>

            <button id="btn-auth-submit" class="btn-modal-close" style="background-color: #f59e0b;" onclick="handleAuthSubmit()">SIGN IN</button>
        </div>
    </div>
</body>
</html>
